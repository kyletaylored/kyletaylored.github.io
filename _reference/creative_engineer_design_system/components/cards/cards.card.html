<!-- @dsCard group="Components" viewport="700x340" name="Cards" subtitle="ExperimentCard + ToolCard" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); padding: 24px; font-family: var(--font-body); }
  .label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #A8A49F; margin-bottom: 10px; font-family: var(--font-mono); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Card.jsx"></script>
<script type="text/babel">
ReactDOM.render(
  React.createElement('div', { style:{ display:'flex', flexDirection:'column', gap:24 }},
    React.createElement('div', null,
      React.createElement('div', { className:'label'}, 'ExperimentCard — category grid'),
      React.createElement('div', { style:{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12 }},
        React.createElement(ExperimentCard, { title:'Experiments', description:'Small projects, big ideas, zero pressure.', tags:['webgl','audio'], icon:'>_', iconColor:'#28D7E5' }),
        React.createElement(ExperimentCard, { title:'AI Lab', description:'Exploring AI models, agents, and systems.', tags:['ai','rag'], icon:'⬡', iconColor:'#F44D8A' }),
        React.createElement(ExperimentCard, { title:'Hardware', description:'Electronics, firmware, and embedded fun.', tags:['esp32','robotics'], icon:'⬛', iconColor:'#FFD54A' }),
      )
    ),
    React.createElement('div', null,
      React.createElement('div', { className:'label'}, 'ToolCard — horizontal list'),
      React.createElement('div', { style:{ display:'flex', flexDirection:'column', gap:8 }},
        React.createElement(ToolCard, { title:'JSON Diff', description:'Compare JSON documents beautifully.' }),
        React.createElement(ToolCard, { title:'Regex Lab', description:'Test and build regex patterns.' }),
      )
    )
  ),
  document.getElementById('root')
);
</script>
</body>
</html>
