<!-- @dsCard group="Spacing" viewport="700x160" subtitle="Space scale" name="Spacing Scale" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-mono); padding: 20px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .bar { background: #28D7E5; height: 16px; border-radius: 2px; }
  .lbl { font-size: 10px; color: #6B6860; width: 80px; }
</style>
</head>
<body>
  <div class="row"><div class="lbl">--space-2 · 8px</div><div class="bar" style="width:8px;"></div></div>
  <div class="row"><div class="lbl">--space-4 · 16px</div><div class="bar" style="width:16px;"></div></div>
  <div class="row"><div class="lbl">--space-6 · 24px</div><div class="bar" style="width:24px;"></div></div>
  <div class="row"><div class="lbl">--space-8 · 32px</div><div class="bar" style="width:32px;"></div></div>
  <div class="row"><div class="lbl">--space-12 · 48px</div><div class="bar" style="width:48px;"></div></div>
  <div class="row"><div class="lbl">--space-20 · 80px</div><div class="bar" style="width:80px;"></div></div>
</body>
</html>
