<!-- @dsCard group="Colors" viewport="700x180" subtitle="Brand palette" name="Brand Colors" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 20px; }
  .swatches { display: flex; gap: 8px; }
  .swatch { flex: 1; border-radius: 4px; overflow: hidden; }
  .swatch-color { height: 72px; }
  .swatch-label { padding: 6px 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: #111; }
  .swatch-hex { font-size: 10px; color: #888; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch"><div class="swatch-color" style="background:#FAF8F3;border:1px solid #E0DDDA;"></div><div class="swatch-label">BG<div class="swatch-hex">#FAF8F3</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#111111;"></div><div class="swatch-label" style="color:#111">Black<div class="swatch-hex">#111111</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#28D7E5;"></div><div class="swatch-label">Teal<div class="swatch-hex">#28D7E5</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F44D8A;"></div><div class="swatch-label">Pink<div class="swatch-hex">#F44D8A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#FFD54A;"></div><div class="swatch-label">Yellow<div class="swatch-hex">#FFD54A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#348BFF;"></div><div class="swatch-label">Blue<div class="swatch-hex">#348BFF</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F25A4C;"></div><div class="swatch-label">Red<div class="swatch-hex">#F25A4C</div></div></div>
</div>
</body>
</html>
