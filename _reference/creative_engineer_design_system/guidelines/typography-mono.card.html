<!-- @dsCard group="Type" viewport="700x200" subtitle="Terminal / code contexts" name="Mono Type" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #111; font-family: var(--font-mono); padding: 20px; }
  .prompt { color: #28D7E5; font-size: 13px; margin-bottom: 4px; }
  .line { font-size: 13px; margin: 2px 0; }
  .key { color: #28D7E5; }
  .val { color: #FAF8F3; }
  .dim { color: #555; }
</style>
</head>
<body>
  <div class="prompt">~ lab $ neofetch</div>
  <div class="line"><span class="key">OS</span>         <span class="val">kyletaylor.dev OS</span></div>
  <div class="line"><span class="key">Shell</span>      <span class="val">zsh</span></div>
  <div class="line"><span class="key">Editor</span>     <span class="val">VS Code</span></div>
  <div class="line"><span class="key">Lang</span>       <span class="val">TypeScript</span></div>
  <div class="line"><span class="key">Framework</span>  <span class="val">Astro</span></div>
  <div class="line"><span class="key">Location</span>   <span class="val">The Lab</span></div>
  <div class="dim" style="margin-top:8px;">~ lab $ _</div>
</body>
</html>
