media:
  input: src/assets/uploads
  output: /uploads

content:
  - name: articles
    label: Articles
    type: collection
    path: src/content/articles
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
        required: true
      - name: pubDate
        type: date
        required: true
      - name: updatedDate
        type: date
      - name: heroImage
        type: image
      - name: category
        type: string
        required: true
      - name: tags
        type: string
        list: true
      - name: draft
        type: boolean
        default: false
      - name: sourceUrl
        type: string
      - name: seo
        type: object
        fields:
          - { name: metaTitle, type: string }
          - { name: metaDescription, type: text }
          - { name: ogImage, type: image }
          - { name: canonicalUrl, type: string }
          - { name: noindex, type: boolean, default: false }
          - { name: jsonLd, type: code, options: { format: json } }
      - name: body
        type: rich-text

  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: summary
        type: text
        required: true
      - name: heroImage
        type: image
      - name: pubDate
        type: date
        required: true
      - name: updatedDate
        type: date
      - name: status
        type: select
        options:
          values: [active, archived, concept]
        default: active
      - name: tags
        type: string
        list: true
      - name: links
        type: object
        fields:
          - { name: caseStudy, type: string }
          - { name: source, type: string }
          - { name: demo, type: string }
      - name: stack
        type: string
        list: true
      - name: featured
        type: boolean
        default: false
      - name: stats
        type: object
        fields:
          - { name: stars, type: string }
          - { name: forks, type: string }
          - { name: lastCommit, type: string }
          - { name: license, type: string }
          - { name: version, type: string }
      - name: features
        type: object
        list: true
        fields:
          - { name: icon, type: string }
          - { name: title, type: string }
          - { name: description, type: text }
      - name: lessons
        type: object
        list: true
        fields:
          - { name: title, type: string }
          - { name: description, type: text }
      - name: seo
        type: object
        fields:
          - { name: metaTitle, type: string }
          - { name: metaDescription, type: text }
          - { name: ogImage, type: image }
          - { name: canonicalUrl, type: string }
          - { name: noindex, type: boolean, default: false }
          - { name: jsonLd, type: code, options: { format: json } }
      - name: body
        type: rich-text

  - name: lab
    label: Lab
    type: collection
    path: src/content/lab
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
        required: true
      - name: pubDate
        type: date
        required: true
      - name: heroImage
        type: image
      - name: labCategory
        type: select
        options:
          values: [experiments, tools, playground, ai, hardware]
      - name: tags
        type: string
        list: true
      - name: status
        type: select
        options:
          values: [wip, stable, archived]
        default: wip
      - name: demoUrl
        type: string
      - name: sourceUrl
        type: string
      - name: seo
        type: object
        fields:
          - { name: metaTitle, type: string }
          - { name: metaDescription, type: text }
          - { name: ogImage, type: image }
          - { name: canonicalUrl, type: string }
          - { name: noindex, type: boolean, default: false }
          - { name: jsonLd, type: code, options: { format: json } }
      - name: body
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
        required: true
      - name: seo
        type: object
        fields:
          - { name: metaTitle, type: string }
          - { name: metaDescription, type: text }
          - { name: ogImage, type: image }
          - { name: canonicalUrl, type: string }
          - { name: noindex, type: boolean, default: false }
          - { name: jsonLd, type: code, options: { format: json } }
      - name: body
        type: rich-text

  - name: settings
    label: Site Settings
    type: file
    path: src/data/site.json
    format: json
    fields:
      - name: siteTitle
        type: string
      - name: brandLabel
        type: string
      - name: siteDescription
        type: text
      - name: footerTaglineLine1
        type: string
      - name: footerTaglineLine2Prefix
        type: string
      - name: footerTaglineLine2Accent
        type: string
      - name: socialLinks
        type: object
        list: true
        fields:
          - name: platform
            type: select
            options:
              values: [github, youtube, instagram, tiktok, linkedin]
          - { name: url, type: string }
